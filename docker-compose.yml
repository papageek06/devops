services:

  db_mysql:
    image: mysql:9.3
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sqlfiles:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p$$MYSQL_ROOT_PASSWORD $$MYSQL_DATABASE -se 'SELECT COUNT(*) FROM utilisateurs' | grep -q '^4$' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: blog_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin blog_db --eval \"if(db.posts.countDocuments({}) !== 5) quit(1)\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  admin_mysql:
    image: adminer
    restart: on-failure
    depends_on:
      db_mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  admin_mongo:
    image: mongo-express
    restart: on-failure
    depends_on:
      db_mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@db_mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    environment:
      MYSQL_HOST: db_mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@db_mongo:27017/blog_db?authSource=admin
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/posts && curl -sf http://localhost:8000/users || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
  mongo_data:
