name: Build and Test Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image api for scanning
        run: docker build --pull --no-cache -t my-apps:1.0.1 -f ./api/Dockerfile ./api
      - name: Build image mongo for scanning
        run: docker build --pull --no-cache -t my-apps-mongo:1.0.1 -f ./Dockerfile .
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker Scout Scan api
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: my-apps:1.0.1
          only-severity: critical,high
          exit-code: false
      - name: Docker Scout Scan Mongo
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: my-apps-mongo:1.0.1
          only-severity: critical,high
          exit-code: false

  check_containers:
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Launch docker-compose
        run: docker compose up -d --build
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'change' }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE || 'ynov_ci' }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME || 'admin' }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD || 'change' }}

      - name: Check containers health status
        run: |
          SERVICES="db_mysql db_mongo admin_mysql admin_mongo api"
          TIMEOUT=240
          INTERVAL=10
          ELAPSED=0

          echo "Waiting for containers to be healthy..."
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            ALL_HEALTHY=true

            for SERVICE in $SERVICES; do
              CONTAINER_ID=$(docker compose ps -q "$SERVICE")
              if [ -z "$CONTAINER_ID" ]; then
                echo "$SERVICE: container not found"
                ALL_HEALTHY=false
                continue
              fi

              STATUS=$(docker inspect "$CONTAINER_ID" --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}')
              echo "$SERVICE: $STATUS"

              if [ "$STATUS" != "healthy" ]; then
                ALL_HEALTHY=false
              fi
            done

            if [ "$ALL_HEALTHY" = "true" ]; then
              echo "All containers are healthy!"
              docker compose ps
              exit 0
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "ERROR: containers did not become healthy within ${TIMEOUT}s"
          docker compose ps
          for SERVICE in $SERVICES; do
            echo "::group::Logs for $SERVICE"
            docker compose logs --no-color "$SERVICE"
            echo "::endgroup::"
          done
          exit 1
