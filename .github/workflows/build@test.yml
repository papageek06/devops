# Build and Test Application ,
on: 
  push :
    branches : [main]
  pull_request : 
    branches: [main]

jobs :
  build_test :
    runs-on : ubuntu-latest
    steps :
        - name : Checkout code
          uses : actions/checkout@v4
        - name : Set Up Docker Buildx
          uses : docker/setup-buildx-action@v3
        - name : build image api for scanning
          run : docker build -t my-apps:1.0.0 -f ./api/Dockerfile .
        - name : build image mongo for scanning
          run : docker build -t my-apps-mongo:1.0.0 -f ./Dockerfile .
        - name : Login to DockerHub
          uses : docker/login-action@v4
          with :
            username : ${{ secrets.DOCKER_USERNAME }}
            password : ${{ secrets.DOCKER_PASSWORD }}
    steps :
        - name : Docker Scout Scan api
          uses : docker/scout-scan-action@v1
          with :
            command : cves , recommendations
            image : my-apps:1.0.0
            files : ./api/Dockerfile
            only-severity : critical,high
            exit-code : true
    steps :
        - name : Docker Scout Scan Mongo
          uses : docker/scout-scan-action@v1
          with :
            command : cves,recommendations
            image : my-apps-mongo:1.0.0
            files : ./Dockerfile
            only-severity : critical,high
            exit-code : true
        
